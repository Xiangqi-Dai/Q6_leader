    cameras:
      head: {}           # 头顶奥比中光 Gemini 335,MJPG 1280x720
      wrist_left: {}     # 左腕 RealSense D435i,YUYV 1920x1080
      wrist_right: {}    # 右腕 RealSense D435i,YUYV 1920x1080
