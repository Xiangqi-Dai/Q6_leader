#
# 录制数据流:主从遥操 + 数据采集(双臂 16 电机 + 3 相机,无升降)。
#   leader(主臂)零力矩 + 输出 position(action)
#   follower(从臂)PD 跟随 + 输出 state(observation)
#   3 cameras(从臂)+ ui(web 控制)+ recorder(从臂,写数据集)
#
# 节点分布:leader@leader,其余@follower。leader 的 action 跨机传到 recorder。
#
# recorder 的 DIRECTORY / NAME 用占位符,由 run_record.sh 运行时替换为
# 用户指定目录 + 时间戳名,保证每次运行独立目录、绝不覆盖。
#
# 相机(从臂,v4l2 探测;全部 30fps,tick=millis/33):
#   head        Orbbec Gemini 335 (by-id CPBDB53000FB)     MJPG 640x480  @30  (720p 相机限 15fps,降分辨率换 30)
#   wrist_left  RealSense D435i 261443064325 (by-id)       YUYV 1920x1080 @30  (需换到 USB3 口)
#   wrist_right RealSense D435i 261143064023 (video11)     YUYV 1920x1080 @30  (USB3;无 by-id,换线后跑 probe_cameras.sh)

nodes:
  - id: leader
    build: pip install -e /ros2_ws/dora_env/dora-openarm-data-collection/nodes/dora-openarm-leader
    path: dora-openarm-leader
    args: "--only right"   # 左臂未上电,只测右臂(左臂上电后改成 both 或删此行)
    _unstable_deploy: { machine: leader }
    inputs:
      control_tick: dora/timer/millis/2     # 500Hz 零力矩帧
      sample_tick: dora/timer/millis/5      # 200Hz 读位 + 输出(= action)
    outputs:
      - position_left
      - position_right

  - id: follower
    build: pip install -e /ros2_ws/dora_env/dora-openarm-data-collection/nodes/dora-openarm-follower
    path: dora-openarm-follower
    args: "--only right"   # 左臂未上电,只测右臂(左臂上电后改成 both 或删此行)
    _unstable_deploy: { machine: follower }
    inputs:
      control_tick: dora/timer/millis/2      # 500Hz 本地 PD
      target_left: leader/position_left
      target_right: leader/position_right
      sample_tick: dora/timer/millis/5       # 200Hz 输出 state(= observation)
    outputs:
      - state_left
      - state_right

  - id: camera-head
    build: pip install opencv-video-capture
    path: opencv-video-capture
    restart_policy: on-failure
    _unstable_deploy: { machine: follower }
    env:
      CAPTURE_PATH: "/dev/v4l/by-id/usb-Orbbec_R__Orbbec_Gemini_335Lg_CPBDB53000FB-video-index0"
      CAPTURE_FOURCC: "MJPG"          # 640x480 MJPG @30fps(720p 相机限 15fps)
      ENCODING: "jpeg"
      IMAGE_WIDTH: 640
      IMAGE_HEIGHT: 480
      JPEG_QUALITY: 90
    inputs:
      tick: dora/timer/millis/33       # 30fps
    outputs:
      - image

  - id: camera-wrist-left
    build: pip install opencv-video-capture
    path: opencv-video-capture
    restart_policy: on-failure
    _unstable_deploy: { machine: follower }
    env:
      CAPTURE_PATH: "/dev/v4l/by-id/usb-Intel_R__RealSense_TM__Depth_Camera_435i_Intel_R__RealSense_TM__Depth_Camera_435i_261443064325-video-index0"
      ENCODING: "jpeg"                 # YUYV 采集(by-id 稳定,换到 USB3 口后 1080p@30)
      IMAGE_WIDTH: 1920
      IMAGE_HEIGHT: 1080
      JPEG_QUALITY: 90
    inputs:
      tick: dora/timer/millis/33       # 30fps
    outputs:
      - image

  - id: camera-wrist-right
    build: pip install opencv-video-capture
    path: opencv-video-capture
    restart_policy: on-failure
    _unstable_deploy: { machine: follower }
    env:
      CAPTURE_PATH: "/dev/video11"     # 261143064023 color(无 by-id;换线后跑 probe_cameras.sh 确认)
      ENCODING: "jpeg"
      IMAGE_WIDTH: 1920
      IMAGE_HEIGHT: 1080
      JPEG_QUALITY: 90
    inputs:
      tick: dora/timer/millis/33       # 30fps
    outputs:
      - image

  - id: ui
    build: pip install -e /ros2_ws/dora_env/dora-openarm-data-collection/nodes/dora-openarm-data-collection-ui
    path: dora-openarm-data-collection-ui
    _unstable_deploy: { machine: follower }
    env:
      METADATA_FILE: "/ros2_ws/dora_env/teleop/metadata-record.yaml"
      AUTO_OPEN: "false"
    inputs:
      tick: dora/timer/secs/1
      camera_head: camera-head/image
      camera_wrist_left: camera-wrist-left/image
      camera_wrist_right: camera-wrist-right/image
    outputs:
      - command

  - id: recorder
    build: pip install -e /ros2_ws/dora_env/dora-openarm-data-collection/nodes/dora-openarm-dataset-recorder
    path: dora-openarm-dataset-recorder
    _unstable_deploy: { machine: follower }
    env:
      DIRECTORY: "__DATASETS_ROOT__"           # run_record.sh 替换
      NAME: "__DATASET_NAME__"                 # run_record.sh 替换为时间戳
      METADATA_FILE: "/ros2_ws/dora_env/teleop/metadata-record.yaml"
      OPERATION_TYPE: "teleop"
    inputs:
      command: ui/command
      arm_left_action: leader/position_left
      arm_right_action: leader/position_right
      arm_left_observation: follower/state_left
      arm_right_observation: follower/state_right
      camera_head: camera-head/image
      camera_wrist_left: camera-wrist-left/image
      camera_wrist_right: camera-wrist-right/image
    outputs: []
